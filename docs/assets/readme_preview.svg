<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-label="Preview of the egocentric scene graph tutorial">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
  </defs>
  <rect width="960" height="420" rx="34" fill="url(#bg)"/>
  <circle cx="784" cy="80" r="150" fill="#a78bfa" opacity=".18"/>
  <circle cx="158" cy="330" r="180" fill="#22d3ee" opacity=".14"/>
  <text x="56" y="76" fill="#eef4ff" font-family="Inter,Arial,sans-serif" font-size="36" font-weight="800">Scene Graph Memory</text>
  <text x="58" y="112" fill="#a8b4c7" font-family="Inter,Arial,sans-serif" font-size="18">Objects, relations, timestamps, provenance, and detector hooks</text>
  <g transform="translate(86 146)" stroke-width="3">
    <line x1="380" y1="122" x2="178" y2="64" stroke="#31415f"/>
    <line x1="380" y1="122" x2="582" y2="64" stroke="#31415f"/>
    <line x1="380" y1="122" x2="220" y2="216" stroke="#31415f"/>
    <line x1="380" y1="122" x2="548" y2="216" stroke="#31415f"/>
    <circle cx="380" cy="122" r="58" fill="#164e63" stroke="#22d3ee"/>
    <circle cx="178" cy="64" r="44" fill="#1f2937" stroke="#a78bfa"/>
    <circle cx="582" cy="64" r="44" fill="#1f2937" stroke="#a78bfa"/>
    <circle cx="220" cy="216" r="44" fill="#1f2937" stroke="#34d399"/>
    <circle cx="548" cy="216" r="44" fill="#1f2937" stroke="#f59e0b"/>
    <g fill="#eef4ff" font-family="Inter,Arial,sans-serif" text-anchor="middle" font-size="16" font-weight="700" stroke="none">
      <text x="380" y="128">hand</text>
      <text x="178" y="70">kettle</text>
      <text x="582" y="70">dripper</text>
      <text x="220" y="222">mug</text>
      <text x="548" y="222">frame</text>
    </g>
    <g fill="#fbbf24" font-family="Inter,Arial,sans-serif" text-anchor="middle" font-size="13" stroke="none">
      <text x="270" y="74">grasps</text>
      <text x="494" y="78">pours</text>
      <text x="296" y="190">detects</text>
      <text x="478" y="188">visible_in</text>
    </g>
    <circle cx="220" cy="216" r="50" fill="none" stroke="#34d399" opacity=".7">
      <animate attributeName="r" values="48;58;48" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".75;.18;.75" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="56" y="360" fill="#eef4ff" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700">Query existing graphs or merge detector/tracker JSON</text>
  <text x="56" y="390" fill="#a8b4c7" font-family="Inter,Arial,sans-serif" font-size="16">ego-scene-graph --graph-json outputs/sample_graph/scene_graph.json --query object:kettle</text>
</svg>
